<div class="login-container">
  <div class="login-card">
    <h1>АгроСубсидия</h1>
    <p class="subtitle">Система управления субсидиями</p>

    <div class="form-group">
      <label>Логин</label>
      <input type="text" [(ngModel)]="username" placeholder="Введите логин" class="input" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" [(ngModel)]="password" placeholder="Введите пароль" class="input" />
    </div>

    @if (error) {
      <div class="error-msg">{{ error }}</div>
    }

    <button class="btn-primary" (click)="onLogin()" [disabled]="loading">
      @if (loading) { Вход... } @else { Войти }
    </button>
  </div>
</div>
